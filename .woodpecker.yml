when:
  - event: [push, manual]

steps:
  notify_start:
    image: curlimages/curl:8.16.0
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        start_epoch="$$(date -u +%s)"
        start_utc="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        commit_message_b64="$$(printf '%s\n' "${CI_COMMIT_MESSAGE}" | head -n 1 | tr '\t' ' ' | tr -s ' ' | sed 's/^ //; s/ $//' | base64 | tr -d '\n')"
        printf '%s\n' "$$start_epoch" > .woodpecker-deploy-start-epoch

        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "start",
          "status": "started",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_message_b64": "$$commit_message_b64",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "meo",
          "site": "meo-gpt-connector",
          "started_at_utc": "$$start_utc",
          "started_at_unix": $$start_epoch,
          "sent_at_utc": "$$start_utc"
        }
        EOF

  verify_deploy_files:
    image: alpine:3.22
    commands:
      - 'test -f docker-compose.yml'
      - 'test -f .env.example'
      - 'test -f utils/deploy-ci.sh'
      - "grep -q 'CONNECTOR_PORT' .env.example"
      - "grep -q 'REDIS_PORT' .env.example"

  deploy_prod:
    image: alpine:3.22
    when:
      - branch: main
        event: [push, manual]
    environment:
      MEO_HOST:
        from_secret: MEO_HOST
      MEO_USER:
        from_secret: MEO_USER
      MEO_SSH_KEY:
        from_secret: MEO_SSH_KEY
      PROD_DEPLOY_PATH:
        from_secret: PROD_DEPLOY_PATH
    commands:
      - 'apk add --no-cache openssh-client bash curl git'
      - 'test -n "$${MEO_HOST}"'
      - 'test -n "$${MEO_USER}"'
      - 'test -n "$${MEO_SSH_KEY}"'
      - 'test -n "$${PROD_DEPLOY_PATH}"'
      - |
        umask 077
        mkdir -p "$$HOME/.ssh"
        chmod 700 "$$HOME/.ssh"
        key_input="$${MEO_SSH_KEY}"
        key_ok=0
        printf '%s\n' "$$key_input" | tr -d '\r' > "$$HOME/.ssh/id_ed25519"
        chmod 600 "$$HOME/.ssh/id_ed25519"
        if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
          key_ok=1
        fi
        if [ "$$key_ok" -ne 1 ]; then
          printf '%b' "$$key_input" | tr -d '\r' > "$$HOME/.ssh/id_ed25519"
          chmod 600 "$$HOME/.ssh/id_ed25519"
          if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
            key_ok=1
          fi
        fi
        if [ "$$key_ok" -ne 1 ]; then
          if printf '%s' "$$key_input" | tr -d '\r\n\t ' | tr -cd 'A-Za-z0-9+/=' | base64 -d > "$$HOME/.ssh/id_ed25519" 2>/dev/null; then
            chmod 600 "$$HOME/.ssh/id_ed25519"
            if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
              key_ok=1
            fi
          fi
        fi
        if [ "$$key_ok" -ne 1 ]; then
          echo "MEO_SSH_KEY is not a valid OpenSSH private key in raw, escaped, or base64 form."
          exit 1
        fi
        ssh-keyscan -H "$${MEO_HOST}" >> "$$HOME/.ssh/known_hosts"
      - |
        ssh "$${MEO_USER}@$${MEO_HOST}" \
          "cd '$${PROD_DEPLOY_PATH}' && \
          git fetch --prune origin && \
          git checkout main && \
          git reset --hard '$${CI_COMMIT_SHA}' && \
          chmod +x ./utils/deploy-ci.sh && \
          CI_COMMIT_BRANCH='main' CI_COMMIT_SHA='$${CI_COMMIT_SHA}' ./utils/deploy-ci.sh '$${PROD_DEPLOY_PATH}' main"

  deploy_dev:
    image: alpine:3.22
    when:
      - branch: dev
        event: [push, manual]
    environment:
      MEO_HOST:
        from_secret: MEO_HOST
      MEO_USER:
        from_secret: MEO_USER
      MEO_SSH_KEY:
        from_secret: MEO_SSH_KEY
      DEV_DEPLOY_PATH:
        from_secret: DEV_DEPLOY_PATH
    commands:
      - 'apk add --no-cache openssh-client bash curl git'
      - 'test -n "$${MEO_HOST}"'
      - 'test -n "$${MEO_USER}"'
      - 'test -n "$${MEO_SSH_KEY}"'
      - 'test -n "$${DEV_DEPLOY_PATH}"'
      - |
        umask 077
        mkdir -p "$$HOME/.ssh"
        chmod 700 "$$HOME/.ssh"
        key_input="$${MEO_SSH_KEY}"
        key_ok=0
        printf '%s\n' "$$key_input" | tr -d '\r' > "$$HOME/.ssh/id_ed25519"
        chmod 600 "$$HOME/.ssh/id_ed25519"
        if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
          key_ok=1
        fi
        if [ "$$key_ok" -ne 1 ]; then
          printf '%b' "$$key_input" | tr -d '\r' > "$$HOME/.ssh/id_ed25519"
          chmod 600 "$$HOME/.ssh/id_ed25519"
          if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
            key_ok=1
          fi
        fi
        if [ "$$key_ok" -ne 1 ]; then
          if printf '%s' "$$key_input" | tr -d '\r\n\t ' | tr -cd 'A-Za-z0-9+/=' | base64 -d > "$$HOME/.ssh/id_ed25519" 2>/dev/null; then
            chmod 600 "$$HOME/.ssh/id_ed25519"
            if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
              key_ok=1
            fi
          fi
        fi
        if [ "$$key_ok" -ne 1 ]; then
          echo "MEO_SSH_KEY is not a valid OpenSSH private key in raw, escaped, or base64 form."
          exit 1
        fi
        ssh-keyscan -H "$${MEO_HOST}" >> "$$HOME/.ssh/known_hosts"
      - |
        ssh "$${MEO_USER}@$${MEO_HOST}" \
          "cd '$${DEV_DEPLOY_PATH}' && \
          git fetch --prune origin && \
          git checkout dev && \
          git reset --hard '$${CI_COMMIT_SHA}' && \
          chmod +x ./utils/deploy-ci.sh && \
          CI_COMMIT_BRANCH='dev' CI_COMMIT_SHA='$${CI_COMMIT_SHA}' ./utils/deploy-ci.sh '$${DEV_DEPLOY_PATH}' dev"

  notify_success:
    image: curlimages/curl:8.16.0
    when:
      - status: success
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        finish_epoch="$$(date -u +%s)"
        finish_utc="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        start_epoch="$$(cat .woodpecker-deploy-start-epoch 2>/dev/null || true)"
        commit_message_b64="$$(printf '%s\n' "${CI_COMMIT_MESSAGE}" | head -n 1 | tr '\t' ' ' | tr -s ' ' | sed 's/^ //; s/ $//' | base64 | tr -d '\n')"
        if [ -n "$$start_epoch" ]; then
          duration_seconds=$$((finish_epoch - start_epoch))
        else
          duration_seconds=null
        fi

        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "finish",
          "status": "success",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_message_b64": "$$commit_message_b64",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "meo",
          "site": "meo-gpt-connector",
          "finished_at_utc": "$$finish_utc",
          "finished_at_unix": $$finish_epoch,
          "duration_seconds": $$duration_seconds,
          "sent_at_utc": "$$finish_utc"
        }
        EOF
      - rm -f .woodpecker-deploy-start-epoch

  notify_failure:
    image: curlimages/curl:8.16.0
    when:
      - status: failure
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        finish_epoch="$$(date -u +%s)"
        finish_utc="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        start_epoch="$$(cat .woodpecker-deploy-start-epoch 2>/dev/null || true)"
        commit_message_b64="$$(printf '%s\n' "${CI_COMMIT_MESSAGE}" | head -n 1 | tr '\t' ' ' | tr -s ' ' | sed 's/^ //; s/ $//' | base64 | tr -d '\n')"
        if [ -n "$$start_epoch" ]; then
          duration_seconds=$$((finish_epoch - start_epoch))
        else
          duration_seconds=null
        fi

        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "finish",
          "status": "failure",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_message_b64": "$$commit_message_b64",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "meo",
          "site": "meo-gpt-connector",
          "finished_at_utc": "$$finish_utc",
          "finished_at_unix": $$finish_epoch,
          "duration_seconds": $$duration_seconds,
          "sent_at_utc": "$$finish_utc"
        }
        EOF
      - rm -f .woodpecker-deploy-start-epoch
